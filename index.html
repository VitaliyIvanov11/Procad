<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e1a">
<title>ProCad</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg:      #0a0e1a;
  --surf:    #111827;
  --panel:   #1a2235;
  --border:  #2a3a52;
  --accent:  #00d4ff;
  --accent2: #00ff88;
  --orange:  #ff6b35;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --radius:  6px;
  --tbh:     50px;
  --sbh:     28px;
  --font-code: 'JetBrains Mono','Fira Code',monospace;
  --font-ui: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TOOLBAR */
#toolbar{
  height:var(--tbh);background:var(--surf);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:5px;padding:0 8px;
  flex-shrink:0;z-index:20;
}
.logo{
  font-family:var(--font-code);font-size:16px;font-weight:900;
  letter-spacing:-1px;margin-right:4px;user-select:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.tbtn{
  height:32px;min-width:32px;border:1px solid var(--border);
  border-radius:var(--radius);background:var(--panel);color:var(--text);
  font-family:var(--font-ui);font-size:11px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:4px;padding:0 8px;transition:all .15s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.tbtn:active{transform:scale(.94);opacity:.8}
.tbtn.primary{
  background:linear-gradient(135deg,#0070f3,#0050b3);
  border-color:#0070f3;color:#fff;padding:0 12px;
}
.tbtn.primary.rendering{background:linear-gradient(135deg,#ff6b35,#cc4400);border-color:#ff6b35}
.tbtn.go{background:linear-gradient(135deg,#00aa55,#007733);border-color:#00aa55;color:#fff}
.tbtn.ai{background:linear-gradient(135deg,#4c1d95,#2d1060);border-color:#7c3aed;color:#c4b5fd}
.spacer{flex:1}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#split{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* PANE HEADER */
.phdr{
  height:26px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;
}
.ptitle{font-family:var(--font-code);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.fname{font-family:var(--font-code);font-size:10px;color:var(--text)}
.pacts{margin-left:auto;display:flex;gap:3px}
.pbtn{
  height:18px;padding:0 6px;border:1px solid var(--border);border-radius:3px;
  background:transparent;color:var(--muted);font-size:9px;cursor:pointer;
  font-family:var(--font-ui);-webkit-tap-highlight-color:transparent;
}
.pbtn:active{color:var(--text);border-color:var(--accent)}

/* EDITOR */
#ep{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#ew{flex:1;overflow:hidden;min-height:0}
.CodeMirror{height:100%!important;background:var(--bg)!important;color:#e2e8f0!important;font-family:var(--font-code)!important;font-size:12.5px!important;line-height:1.65!important}
.CodeMirror-scroll{padding-bottom:60px}
.CodeMirror-gutters{background:#0d1424!important;border-right:1px solid var(--border)!important}
.CodeMirror-linenumber{color:#334155!important;font-size:10px!important;min-width:28px!important}
.CodeMirror-cursor{border-left:2px solid var(--accent)!important}
.CodeMirror-selected{background:rgba(0,212,255,.12)!important}
.CodeMirror-activeline-background{background:rgba(255,255,255,.025)!important}
.cm-keyword{color:#f472b6!important}.cm-def,.cm-variable-2{color:#60a5fa!important}
.cm-string{color:#86efac!important}.cm-number{color:#fbbf24!important}
.cm-comment{color:#475569!important;font-style:italic!important}
.cm-property{color:#c084fc!important}.cm-operator{color:var(--accent)!important}

/* DIVIDER */
#div{height:5px;background:var(--border);cursor:row-resize;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#div::after{content:'';width:32px;height:3px;border-radius:2px;background:var(--muted);opacity:.4}

/* PREVIEW */
#pp{display:flex;flex-direction:column;overflow:hidden;min-height:0;height:250px}
#pw{flex:1;position:relative;overflow:hidden;background:var(--bg);min-height:0}
#tc{width:100%!important;height:100%!important;display:block;touch-action:none}

/* Grid overlay */
#gh{position:absolute;inset:0;pointer-events:none;opacity:.03;
  background-image:linear-gradient(var(--text) 1px,transparent 1px),linear-gradient(90deg,var(--text) 1px,transparent 1px);
  background-size:25px 25px}

/* Overlay */
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;pointer-events:none}
.ov-ico{font-size:32px;opacity:.2}
.ov-txt{font-family:var(--font-ui);font-size:11px;color:var(--muted);text-align:center;padding:0 20px}

/* Spinner */
#spin{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:rgba(10,14,26,.75);z-index:10;flex-direction:column;gap:10px}
#spin.on{display:flex}
.sring{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.stxt{font-family:var(--font-ui);font-size:11px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}

/* Mesh info */
#minfo{position:absolute;top:6px;right:8px;font-family:var(--font-code);font-size:9px;color:var(--muted);opacity:.6;pointer-events:none;text-align:right;line-height:1.6}

/* STATUS */
#sb{height:var(--sbh);background:var(--surf);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--accent2)}.sdot.err{background:var(--orange)}.sdot.busy{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
#stxt{font-family:var(--font-code);font-size:9px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#smeta{font-family:var(--font-code);font-size:9px;color:var(--border)}

/* AI PANEL */
#aip{display:none;flex-direction:column;position:absolute;bottom:var(--sbh);left:0;right:0;height:48%;background:var(--surf);border-top:2px solid #7c3aed;z-index:30;overflow:hidden}
#aip.open{display:flex}
.aihdr{height:34px;display:flex;align-items:center;padding:0 10px;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;background:#0f0820}
.aititle{font-family:var(--font-code);font-size:10px;color:#a78bfa;font-weight:700;letter-spacing:.5px}
.aix{margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1;-webkit-tap-highlight-color:transparent}
#aims{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
.am{font-family:var(--font-ui);font-size:11px;line-height:1.5;padding:7px 9px;border-radius:var(--radius);max-width:92%}
.am.user{background:#1e3a5f;border:1px solid #1d4ed8;color:#93c5fd;align-self:flex-end}
.am.assistant{background:#1a0f2e;border:1px solid #7c3aed;color:#ddd6fe;align-self:flex-start}
.am.sys{background:transparent;color:var(--muted);font-style:italic;font-size:9px;align-self:center;border:none;padding:2px 0}
#airow{display:flex;gap:5px;padding:6px 8px;border-top:1px solid var(--border);flex-shrink:0;background:#0f0820}
#aiinp{flex:1;height:32px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-ui);font-size:11px;padding:0 8px;outline:none}
#aiinp:focus{border-color:#7c3aed}
#aisend{height:32px;width:32px;background:#7c3aed;border:none;border-radius:var(--radius);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}

/* SNIPPETS */
#snd{display:none;position:absolute;top:var(--tbh);right:0;width:200px;bottom:var(--sbh);background:var(--surf);border-left:1px solid var(--border);z-index:25;flex-direction:column;overflow:hidden}
#snd.open{display:flex}
.dhdr{height:34px;display:flex;align-items:center;padding:0 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.dtitle{font-family:var(--font-ui);font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.dx{margin-left:auto;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#snl{flex:1;overflow-y:auto;padding:5px}
.sni{padding:7px 8px;border-radius:5px;cursor:pointer;margin-bottom:2px;border:1px solid var(--border);transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.sni:active{border-color:var(--accent);background:rgba(0,212,255,.06)}
.snname{font-family:var(--font-code);font-size:10px;color:var(--text);font-weight:600}
.sndesc{font-family:var(--font-ui);font-size:9px;color:var(--muted);margin-top:2px}

/* TOAST */
#toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-family:var(--font-ui);font-size:11px;color:var(--text);opacity:0;transition:all .2s;z-index:100;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--accent2);color:var(--accent2)}
#toast.err{border-color:var(--orange);color:var(--orange)}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="logo">ProCad</div>
    <div class="sep"></div>
    <button class="tbtn primary" id="rbtn" onclick="doRender()">▶ Render</button>
    <button class="tbtn go" id="xbtn" onclick="exportSTL()" disabled>⬇ STL</button>
    <div class="sep"></div>
    <button class="tbtn ai" onclick="toggleAI()">✦ AI</button>
    <button class="tbtn" onclick="toggleSnippets()">☰</button>
    <div class="spacer"></div>
    <button class="tbtn" onclick="resetCam()" title="Reset">⊕</button>
  </div>

  <div id="main">
    <div id="split">
      <div id="ep">
        <div class="phdr">
          <span class="ptitle">Editor</span>
          <span class="fname">model.jscad</span>
          <div class="pacts">
            <button class="pbtn" onclick="clearEd()">Clear</button>
            <button class="pbtn" onclick="loadEx()">Example</button>
          </div>
        </div>
        <div id="ew"><textarea id="ce"></textarea></div>
      </div>
      <div id="div"></div>
      <div id="pp">
        <div class="phdr">
          <span class="ptitle">3D Preview — CSG Engine</span>
          <div class="pacts"><span class="pbtn" id="triinfo" style="cursor:default"></span></div>
        </div>
        <div id="pw">
          <div id="gh"></div>
          <canvas id="tc"></canvas>
          <div id="ov">
            <div class="ov-ico">◈</div>
            <div class="ov-txt">Press Render ▶ — True CSG boolean operations</div>
          </div>
          <div id="spin"><div class="sring"></div><div class="stxt" id="spintxt">Computing CSG…</div></div>
          <div id="minfo"></div>
        </div>
      </div>
    </div>

    <div id="aip">
      <div class="aihdr">
        <span class="aititle">✦ ProCad AI</span>
        <button class="aix" onclick="toggleAI()">×</button>
      </div>
      <div id="aims">
        <div class="am sys">ProCad AI — asks about geometry, operations, JSCAD API</div>
      </div>
      <div id="airow">
        <input id="aiinp" type="text" placeholder="Ask about your model…" autocomplete="off">
        <button id="aisend" onclick="sendAI()">➤</button>
      </div>
    </div>

    <div id="snd">
      <div class="dhdr"><span class="dtitle">Snippets</span><button class="dx" onclick="toggleSnippets()">×</button></div>
      <div id="snl"></div>
    </div>
  </div>

  <div id="sb">
    <div class="sdot" id="sdot"></div>
    <span id="stxt">Ready — Ctrl+Enter to render</span>
    <span id="smeta">ProCad v2.0 · CSG</span>
  </div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════
// BSP-based TRUE CSG ENGINE
// ═══════════════════════════════════════
const CSGEngine = (() => {
class Vertex {
  constructor(pos, normal) { this.pos = pos.clone(); this.normal = normal ? normal.clone() : new THREE.Vector3(); }
  clone() { return new Vertex(this.pos, this.normal); }
  flip() { this.normal.negate(); }
  interpolate(o, t) { return new Vertex(this.pos.clone().lerp(o.pos, t), this.normal.clone().lerp(o.normal, t)); }
}
class Plane {
  constructor(n, w) { this.normal = n.clone(); this.w = w; }
  static fromPoints(a, b, c) { const n = b.clone().sub(a).cross(c.clone().sub(a)).normalize(); return new Plane(n, n.dot(a)); }
  clone() { return new Plane(this.normal, this.w); }
  flip() { this.normal.negate(); this.w = -this.w; }
  splitPolygon(poly, cf, cb, f, b) {
    const EPS=1e-5, CO=0, FR=1, BA=2, SP=3;
    let pt=0;
    const types = poly.vertices.map(v => { const t=this.normal.dot(v.pos)-this.w; const tp=t<-EPS?BA:t>EPS?FR:CO; pt|=tp; return tp; });
    if(pt===CO)(this.normal.dot(poly.plane.normal)>0?cf:cb).push(poly);
    else if(pt===FR)f.push(poly);
    else if(pt===BA)b.push(poly);
    else {
      const fa=[],ba=[];
      for(let i=0;i<poly.vertices.length;i++){
        const j=(i+1)%poly.vertices.length, ti=types[i], tj=types[j], vi=poly.vertices[i], vj=poly.vertices[j];
        if(ti!==BA)fa.push(vi); if(ti!==FR)ba.push(ti!==BA?vi.clone():vi);
        if((ti|tj)===SP){const t=(this.w-this.normal.dot(vi.pos))/this.normal.dot(vj.pos.clone().sub(vi.pos)); const v=vi.interpolate(vj,t); fa.push(v); ba.push(v.clone());}
      }
      if(fa.length>=3)f.push(new Polygon(fa));
      if(ba.length>=3)b.push(new Polygon(ba));
    }
  }
}
class Polygon {
  constructor(v) { this.vertices=v; this.plane=Plane.fromPoints(v[0].pos,v[1].pos,v[2].pos); }
  clone() { return new Polygon(this.vertices.map(v=>v.clone())); }
  flip() { this.vertices.reverse().forEach(v=>v.flip()); this.plane.flip(); }
}
class Node {
  constructor(p) { this.plane=null; this.front=null; this.back=null; this.polygons=[]; if(p&&p.length)this.build(p); }
  invert() { this.polygons.forEach(p=>p.flip()); if(this.plane)this.plane.flip(); if(this.front)this.front.invert(); if(this.back)this.back.invert(); [this.front,this.back]=[this.back,this.front]; }
  clipPolygons(p) { if(!this.plane)return p.slice(); let f=[],b=[]; p.forEach(poly=>this.plane.splitPolygon(poly,f,b,f,b)); if(this.front)f=this.front.clipPolygons(f); if(this.back)b=this.back.clipPolygons(b);else b=[]; return f.concat(b); }
  clipTo(bsp) { this.polygons=bsp.clipPolygons(this.polygons); if(this.front)this.front.clipTo(bsp); if(this.back)this.back.clipTo(bsp); }
  allPolygons() { let p=this.polygons.slice(); if(this.front)p=p.concat(this.front.allPolygons()); if(this.back)p=p.concat(this.back.allPolygons()); return p; }
  build(p) { if(!p.length)return; if(!this.plane)this.plane=p[0].plane.clone(); const f=[],b=[]; p.forEach(poly=>this.plane.splitPolygon(poly,this.polygons,this.polygons,f,b)); if(f.length){if(!this.front)this.front=new Node();this.front.build(f);} if(b.length){if(!this.back)this.back=new Node();this.back.build(b);} }
}
class CSG {
  constructor(p){this.polygons=p||[]}
  clone(){return new CSG(this.polygons.map(p=>p.clone()))}
  union(c){const a=new Node(this.polygons.map(p=>p.clone())),b=new Node(c.polygons.map(p=>p.clone()));a.clipTo(b);b.clipTo(a);b.invert();b.clipTo(a);b.invert();a.build(b.allPolygons());return new CSG(a.allPolygons())}
  subtract(c){const a=new Node(this.polygons.map(p=>p.clone())),b=new Node(c.polygons.map(p=>p.clone()));a.invert();a.clipTo(b);b.clipTo(a);b.invert();b.clipTo(a);b.invert();a.build(b.allPolygons());a.invert();return new CSG(a.allPolygons())}
  intersect(c){const a=new Node(this.polygons.map(p=>p.clone())),b=new Node(c.polygons.map(p=>p.clone()));a.invert();b.clipTo(a);b.invert();a.clipTo(b);b.clipTo(a);a.build(b.allPolygons());a.invert();return new CSG(a.allPolygons())}
  static fromGeo(geo){
    const pos=geo.attributes.position,norm=geo.attributes.normal,idx=geo.index,polys=[],cnt=idx?idx.count:pos.count;
    for(let i=0;i<cnt;i+=3){
      const vs=[];
      for(let j=0;j<3;j++){const k=idx?idx.getX(i+j):i+j;vs.push(new Vertex(new THREE.Vector3(pos.getX(k),pos.getY(k),pos.getZ(k)),norm?new THREE.Vector3(norm.getX(k),norm.getY(k),norm.getZ(k)):new THREE.Vector3()));}
      if(vs.length>=3)polys.push(new Polygon(vs));
    }
    return new CSG(polys);
  }
  toGeo(){
    const pos=[],nrm=[];
    this.polygons.forEach(poly=>{const v=poly.vertices;for(let i=2;i<v.length;i++){[v[0],v[i-1],v[i]].forEach(vt=>{pos.push(vt.pos.x,vt.pos.y,vt.pos.z);nrm.push(poly.plane.normal.x,poly.plane.normal.y,poly.plane.normal.z);})}});
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('normal',new THREE.Float32BufferAttribute(nrm,3));
    g.computeVertexNormals();return g;
  }
}
return {CSG};
})();

// ═══════════════════════════════════════
// PROCAD MODELING API
// ═══════════════════════════════════════
const PCAD = (() => {
  const {CSG} = CSGEngine;

  function geoToCSG(geo) {
    const g = geo.clone();
    g.computeVertexNormals();
    // Convert indexed to non-indexed for CSG
    if(g.index) {
      const ni = g.toNonIndexed();
      ni.computeVertexNormals();
      return CSG.fromGeo(ni);
    }
    return CSG.fromGeo(g);
  }

  function toCSG(obj) {
    if(obj._csg) return obj._csg;
    if(obj._geo) return geoToCSG(obj._geo);
    throw new Error('Invalid object');
  }

  function wrap(csg) { return { _csg: csg, _geo: null }; }
  function wrapGeo(geo) { return { _csg: null, _geo: geo }; }

  function applyMat(obj, mat) {
    if(obj._geo) {
      const g = obj._geo.clone();
      g.applyMatrix4(mat);
      return wrapGeo(g);
    }
    if(obj._csg) {
      // Apply transform to CSG polygons
      const csg = obj._csg;
      const polys = csg.polygons.map(poly => {
        const verts = poly.vertices.map(v => {
          const np = v.pos.clone().applyMatrix4(mat);
          const nn = v.normal.clone().transformDirection(mat);
          const nv = new (Object.getPrototypeOf(v).constructor || Object)(np, nn);
          nv.pos = np; nv.normal = nn;
          return nv;
        });
        // rebuild polygon
        const p = Object.create(poly);
        p.vertices = verts;
        try {
          const {Plane} = (() => { throw 0; })();
        } catch(_) {}
        return p;
      });
      // Re-wrap as geo and convert back
      const g = csg.toGeo();
      g.applyMatrix4(mat);
      return wrapGeo(g);
    }
  }

  const cube = ({size=1, center=false}={}) => {
    const s = Array.isArray(size)?size:[size,size,size];
    const g = new THREE.BoxGeometry(s[0],s[1],s[2]);
    if(!center) g.translate(s[0]/2,s[1]/2,s[2]/2);
    return wrapGeo(g);
  };

  const sphere = ({r=1, fn=24}={}) => {
    const g = new THREE.SphereGeometry(r, fn, Math.ceil(fn/2));
    return wrapGeo(g);
  };

  const cylinder = ({r=1, r1, r2, h=2, fn=32, center=false}={}) => {
    const rt=r2!==undefined?r2:r, rb=r1!==undefined?r1:r;
    const g = new THREE.CylinderGeometry(rt,rb,h,fn);
    if(!center) g.translate(0,h/2,0);
    return wrapGeo(g);
  };

  const torus = ({r=4, tube=1, fn=48}={}) => {
    const g = new THREE.TorusGeometry(r,tube,16,fn);
    return wrapGeo(g);
  };

  const translate = ([x,y,z], obj) => {
    const g = (obj._geo||obj._csg.toGeo()).clone();
    g.translate(x,y,z);
    return wrapGeo(g);
  };

  const rotate = ([rx,ry,rz], obj) => {
    const g = (obj._geo||obj._csg.toGeo()).clone();
    const d = Math.PI/180;
    g.rotateX(rx*d); g.rotateY(ry*d); g.rotateZ(rz*d);
    return wrapGeo(g);
  };

  const scale = (s, obj) => {
    const sv = Array.isArray(s)?s:[s,s,s];
    const g = (obj._geo||obj._csg.toGeo()).clone();
    g.scale(sv[0],sv[1],sv[2]);
    return wrapGeo(g);
  };

  // TRUE CSG operations using BSP trees
  function csgOp(op, objs) {
    const flat = objs.flat(Infinity).filter(Boolean);
    if(!flat.length) return wrapGeo(new THREE.BufferGeometry());
    let result = toCSG(flat[0]);
    for(let i=1;i<flat.length;i++) {
      const b = toCSG(flat[i]);
      result = result[op](b);
    }
    return wrap(result);
  }

  const union        = (...o) => csgOp('union',       o);
  const difference   = (a,...s) => { let r=toCSG(a); s.flat(Infinity).filter(Boolean).forEach(x=>{r=r.subtract(toCSG(x));}); return wrap(r); };
  const intersection = (...o) => csgOp('intersect',   o);

  // Convert final result to Three.js mesh geometry
  function toThreeGeo(obj) {
    if(!obj) return null;
    if(Array.isArray(obj)) {
      // Merge all
      const geos = obj.map(o=>toThreeGeo(o)).filter(Boolean);
      if(!geos.length) return null;
      // Simple merge
      let result = toCSG(obj[0]);
      for(let i=1;i<obj.length;i++) result = result.union(toCSG(obj[i]));
      return result.toGeo();
    }
    if(obj._csg) return obj._csg.toGeo();
    if(obj._geo) return obj._geo;
    return null;
  }

  return { cube, sphere, cylinder, torus, translate, rotate, scale, union, difference, intersection, toThreeGeo };
})();

// THREE.JS SCENE
// ═══════════════════════════════════════
let scene, camera, renderer, meshObj = null;

function initThree() {
  const wrap = document.getElementById('pw');
  const canvas = document.getElementById('tc');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0e1a);

  const grid = new THREE.GridHelper(200,30,0x1e2d42,0x1e2d42);
  scene.add(grid);
  scene.add(new THREE.AxesHelper(8));

  scene.add(new THREE.AmbientLight(0xffffff,0.35));
  const dl1=new THREE.DirectionalLight(0xffffff,0.9); dl1.position.set(15,25,15); scene.add(dl1);
  const dl2=new THREE.DirectionalLight(0x4488ff,0.3); dl2.position.set(-10,-5,-10); scene.add(dl2);

  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth/wrap.clientHeight, 0.1, 2000);
  camera.position.set(20,18,28);
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);

  new ResizeObserver(()=>{renderer.setSize(wrap.clientWidth,wrap.clientHeight);camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();}).observe(wrap);

  setupControls(canvas);
  (function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);})();
}

function setupControls(canvas) {
  let sph={th:0.7,ph:1.1,r:40}, tgt=new THREE.Vector3(), drag=false, prev={x:0,y:0};
  let pt1=null,pt2=null,pd=null;

  function upd(){camera.position.set(tgt.x+sph.r*Math.sin(sph.ph)*Math.sin(sph.th),tgt.y+sph.r*Math.cos(sph.ph),tgt.z+sph.r*Math.sin(sph.ph)*Math.cos(sph.th));camera.lookAt(tgt);}
  upd();
  window._resetCam=()=>{sph={th:0.7,ph:1.1,r:40};tgt.set(0,0,0);upd();}
  window._fitCam=(geo)=>{if(!geo)return;const b=new THREE.Box3().setFromBufferAttribute(geo.attributes.position);const c=new THREE.Vector3(),s=new THREE.Vector3();b.getCenter(c);b.getSize(s);tgt.copy(c);sph.r=Math.max(s.x,s.y,s.z)*2.8;upd();}

  canvas.addEventListener('mousedown',e=>{drag=true;prev={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',()=>drag=false);
  window.addEventListener('mousemove',e=>{if(!drag)return;sph.th-=(e.clientX-prev.x)*.01;sph.ph=Math.max(.05,Math.min(Math.PI-.05,sph.ph+(e.clientY-prev.y)*.01));prev={x:e.clientX,y:e.clientY};upd();});
  canvas.addEventListener('wheel',e=>{sph.r=Math.max(1,Math.min(1000,sph.r*(1+e.deltaY*.001)));upd();});

  canvas.addEventListener('touchstart',e=>{e.preventDefault();if(e.touches.length===1)pt1={x:e.touches[0].clientX,y:e.touches[0].clientY};else if(e.touches.length===2){pt1={x:e.touches[0].clientX,y:e.touches[0].clientY};pt2={x:e.touches[1].clientX,y:e.touches[1].clientY};pd=Math.hypot(pt1.x-pt2.x,pt1.y-pt2.y);}},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&pt1){const dx=e.touches[0].clientX-pt1.x,dy=e.touches[0].clientY-pt1.y;sph.th-=dx*.013;sph.ph=Math.max(.05,Math.min(Math.PI-.05,sph.ph+dy*.013));pt1={x:e.touches[0].clientX,y:e.touches[0].clientY};upd();}else if(e.touches.length===2&&pt2){const t1={x:e.touches[0].clientX,y:e.touches[0].clientY},t2={x:e.touches[1].clientX,y:e.touches[1].clientY},d=Math.hypot(t1.x-t2.x,t1.y-t2.y);if(pd)sph.r=Math.max(1,Math.min(1000,sph.r*(pd/d)));const mx=(t1.x+t2.x)/2,my=(t1.y+t2.y)/2,pmx=(pt1.x+pt2.x)/2,pmy=(pt1.y+pt2.y)/2;const right=new THREE.Vector3();camera.getWorldDirection(right);right.cross(camera.up).normalize();const sp=sph.r*.002;tgt.addScaledVector(right,-(mx-pmx)*sp);tgt.addScaledVector(camera.up,(my-pmy)*sp);pt1=t1;pt2=t2;pd=d;upd();}},{passive:false});
  canvas.addEventListener('touchend',e=>{if(e.touches.length===0){pt1=null;pt2=null;pd=null;}else if(e.touches.length===1){pt1={x:e.touches[0].clientX,y:e.touches[0].clientY};pt2=null;}});
}

function resetCam(){if(window._resetCam)window._resetCam();}

// EDITOR
// ═══════════════════════════════════════
let editor;
const DEFAULT = `// ProCad — True CSG boolean operations
const { cube, sphere, cylinder, translate, rotate, union, difference } = PCAD;

// Wall mount holder example
const W=60, H=135, OD=40, IW=48, ID=34, T=5, BH=15;

const back   = cube({ size:[W, H, T] });
const sideL  = translate([0, BH, T],    cube({size:[T, H-BH, ID]}));
const sideR  = translate([W-T, BH, T],  cube({size:[T, H-BH, ID]}));
const bottom = translate([0, 0, T],     cube({size:[W, BH, ID]}));
const topBar = translate([0, H-T, T],   cube({size:[W, T, ID]}));

// TRUE difference — CSG cuts real holes
const khTop = union(
  translate([W/2, H-18, -1], cylinder({r:4,   h:T+2, fn:24})),
  translate([W/2, H-25, -1], cylinder({r:2.5, h:T+2, fn:24})),
  translate([W/2-2.5, H-25, -1], cube({size:[5,7,T+2]}))
);
const khBot = union(
  translate([W/2, 18, -1], cylinder({r:4,   h:T+2, fn:24})),
  translate([W/2, 11, -1], cylinder({r:2.5, h:T+2, fn:24})),
  translate([W/2-2.5, 11, -1], cube({size:[5,7,T+2]}))
);

const shell = union(back, sideL, sideR, bottom, topBar);
return difference(shell, khTop, khBot);`;

function initEditor() {
  editor = CodeMirror.fromTextArea(document.getElementById('ce'),{
    mode:'javascript',lineNumbers:true,matchBrackets:true,
    autoCloseBrackets:true,indentUnit:2,tabSize:2,lineWrapping:false,
    extraKeys:{'Ctrl-Enter':doRender,'Cmd-Enter':doRender}
  });
  editor.setValue(DEFAULT);
}
function clearEd(){editor.setValue('const { cube } = PCAD;\nreturn cube({ size: 10 });')}
function loadEx(){editor.setValue(DEFAULT);toast('Example loaded','ok')}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function setStatus(t,s=''){document.getElementById('stxt').textContent=t;const d=document.getElementById('sdot');d.className='sdot'+(s?' '+s:'');}

let currentGeo = null;

async function doRender() {
  const btn=document.getElementById('rbtn');
  btn.disabled=true; btn.classList.add('rendering'); btn.textContent='⏳ Computing…';
  document.getElementById('spin').classList.add('on');
  document.getElementById('spintxt').textContent='CSG boolean operations…';
  setStatus('Rendering with CSG…','busy');
  await new Promise(r=>setTimeout(r,50));

  try {
    const code = editor.getValue();
    // Run in async context to allow UI updates for large models
    const result = await new Promise((resolve, reject) => {
      try {
        const fn = new Function('PCAD', '"use strict";\n' + code);
        resolve(fn(PCAD));
      } catch(e) { reject(e); }
    });

    document.getElementById('spintxt').textContent='Building mesh…';
    await new Promise(r=>setTimeout(r,20));

    const geo = PCAD.toThreeGeo(result);
    if(!geo) throw new Error('No geometry returned');

    // Display
    if(meshObj){scene.remove(meshObj);meshObj.geometry&&meshObj.geometry.dispose();}
    geo.computeVertexNormals();

    const mat = new THREE.MeshPhongMaterial({
      color:0x2a7fc9, specular:0x1144aa, shininess:80,
      side:THREE.DoubleSide
    });
    meshObj = new THREE.Mesh(geo, mat);
    meshObj.castShadow=true;
    scene.add(meshObj);
    currentGeo = geo;

    // Stats
    const tc = (geo.index?geo.index.count:geo.attributes.position.count)/3;
    document.getElementById('triinfo').textContent = Math.floor(tc).toLocaleString()+' tri';
    document.getElementById('minfo').textContent = Math.floor(tc).toLocaleString()+' triangles\nCSG ✓';
    document.getElementById('ov').style.display='none';
    document.getElementById('xbtn').disabled=false;

    if(window._fitCam) window._fitCam(geo);
    setStatus('Render complete — '+Math.floor(tc).toLocaleString()+' triangles','ok');
    toast('Render complete ✓','ok');
  } catch(e) {
    setStatus('Error: '+e.message,'err');
    toast(e.message,'err');
    console.error(e);
  } finally {
    btn.disabled=false; btn.classList.remove('rendering'); btn.textContent='▶ Render';
    document.getElementById('spin').classList.remove('on');
  }
}

// ═══════════════════════════════════════
// STL EXPORT
// ═══════════════════════════════════════
function exportSTL() {
  if(!currentGeo){toast('Nothing to export','err');return;}
  const pos=currentGeo.attributes.position;
  const norm=currentGeo.attributes.normal;
  const idx=currentGeo.index;
  let stl='solid ProCad\n', tc=0;
  const cnt=idx?idx.count:pos.count;
  for(let i=0;i<cnt;i+=3){
    const gi=j=>idx?idx.getX(i+j):i+j;
    const v=j=>new THREE.Vector3(pos.getX(gi(j)),pos.getY(gi(j)),pos.getZ(gi(j)));
    const n=norm?new THREE.Vector3(norm.getX(gi(0)),norm.getY(gi(0)),norm.getZ(gi(0))):new THREE.Vector3(0,0,1);
    stl+=`  facet normal ${n.x.toFixed(6)} ${n.y.toFixed(6)} ${n.z.toFixed(6)}\n    outer loop\n`;
    for(let j=0;j<3;j++){const vj=v(j);stl+=`      vertex ${vj.x.toFixed(6)} ${vj.y.toFixed(6)} ${vj.z.toFixed(6)}\n`;}
    stl+='    endloop\n  endfacet\n'; tc++;
  }
  stl+='endsolid ProCad\n';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([stl],{type:'text/plain'}));
  a.download='procad_model.stl'; a.click();
  toast('STL exported — '+tc.toLocaleString()+' triangles','ok');
  setStatus('Exported '+tc.toLocaleString()+' triangles','ok');
}

let aiOpen=false, aiHist=[];
function toggleAI(){aiOpen=!aiOpen;document.getElementById('aip').classList.toggle('open',aiOpen);}

async function sendAI() {
  const inp=document.getElementById('aiinp');
  const msg=inp.value.trim(); if(!msg)return;
  const code=editor.getValue(); inp.value='';
  addMsg('user',msg);
  aiHist.push({role:'user',content:msg});
  const sys=`You are ProCad AI, expert in JSCAD/CSG parametric 3D modeling.
API: cube({size,center}), sphere({r,fn}), cylinder({r,r1,r2,h,fn,center}), torus({r,tube,fn}),
translate([x,y,z],obj), rotate([x,y,z],obj), scale(v,obj),
union(...objs), difference(base,...subs), intersection(...objs)
All operations use TRUE CSG boolean ops (BSP tree).
Be concise. Use \`\`\`js code blocks.
Current code:\n\`\`\`js\n${code}\n\`\`\``;
  const el=addMsg('assistant','…'); el.style.opacity='.5';
  try {
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:aiHist})});
    const d=await r.json(); const reply=d.content?.[0]?.text||'No response';
    el.textContent=reply; el.style.opacity='1';
    aiHist.push({role:'assistant',content:reply});
    const cm=reply.match(/```(?:js|javascript)?\n([\s\S]+?)```/);
    if(cm&&(reply.match(/```/g)||[]).length===2){const b=document.createElement('button');b.textContent='⬆ Insert';b.style.cssText='margin-top:5px;padding:3px 8px;border:1px solid #00ff88;background:#0a2a1a;color:#00ff88;border-radius:4px;font-size:9px;cursor:pointer;display:block;font-family:sans-serif';b.onclick=()=>{editor.setValue(cm[1]);toast('Code inserted','ok');};el.appendChild(document.createElement('br'));el.appendChild(b);}
  } catch(e){el.textContent='AI error: '+e.message;el.style.opacity='1';}
  document.getElementById('aims').scrollTop=9999;
}

function addMsg(role,text){const el=document.createElement('div');el.className='am '+role;el.textContent=text;const c=document.getElementById('aims');c.appendChild(el);c.scrollTop=9999;return el;}
document.getElementById('aiinp').addEventListener('keydown',e=>{if(e.key==='Enter')sendAI();});

// DIVIDER

function initDiv(){
  const dv=document.getElementById('div'),ep=document.getElementById('ep'),pp=document.getElementById('pp');
  let on=false,sy=0,se=0,sp=0;
  const start=y=>{on=true;sy=y;se=ep.getBoundingClientRect().height;sp=pp.getBoundingClientRect().height;};
  const move=y=>{if(!on)return;const dy=y-sy;ep.style.flex='none';ep.style.height=Math.max(80,se+dy)+'px';pp.style.height=Math.max(80,sp-dy)+'px';editor.refresh();};
  dv.addEventListener('mousedown',e=>start(e.clientY));
  window.addEventListener('mousemove',e=>move(e.clientY));
  window.addEventListener('mouseup',()=>on=false);
  dv.addEventListener('touchstart',e=>{e.preventDefault();start(e.touches[0].clientY);},{passive:false});
  window.addEventListener('touchmove',e=>{if(on){e.preventDefault();move(e.touches[0].clientY);}},{passive:false});
  window.addEventListener('touchend',()=>on=false);
}
