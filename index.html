<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>ForgeCAD</title>
<link rel="manifest" href="manifest.json">

<!-- Three.js for 3D preview -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- CodeMirror for syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --panel:    #1c2128;
    --border:   #30363d;
    --accent:   #f78166;
    --accent2:  #56d364;
    --text:     #e6edf3;
    --muted:    #7d8590;
    --warning:  #d29922;
    --font-code: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius:    8px;
    --toolbar-h: 52px;
    --status-h:  32px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    height: var(--toolbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    flex-shrink: 0;
    z-index: 20;
  }
  .logo {
    font-family: var(--font-code);
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-right: 4px;
    user-select: none;
  }
  .logo span { color: var(--accent2); }
  .tb-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .tb-btn {
    height: 34px;
    min-width: 34px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 0 10px;
    transition: all .15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .tb-btn:active { transform: scale(.95); }
  .tb-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
    padding: 0 14px;
  }
  .tb-btn.primary:active { background: #d96a55; }
  .tb-btn.success {
    background: #1a3a1e;
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .tb-btn.ai-btn {
    background: linear-gradient(135deg, #1a1f35, #1e2a1e);
    border-color: #7c6af7;
    color: #a78bfa;
  }
  .tb-spacer { flex: 1; }
  .tb-icon { font-size: 14px; }
  #render-label { display: inline; }

  /* ── MAIN AREA ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── SPLIT PANEL ── */
  #split {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Editor pane */
  #editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .pane-header {
    height: 28px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    flex-shrink: 0;
  }
  .pane-title {
    font-family: var(--font-code);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }
  .file-name {
    font-family: var(--font-code);
    font-size: 11px;
    color: var(--text);
  }
  .pane-actions { margin-left: auto; display: flex; gap: 4px; }
  .pane-btn {
    height: 20px;
    padding: 0 7px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    font-size: 10px;
    cursor: pointer;
    font-family: var(--font-ui);
    transition: color .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .pane-btn:active { color: var(--text); }

  /* CodeMirror overrides */
  .CodeMirror {
    height: 100% !important;
    background: var(--bg) !important;
    color: #e6edf3 !important;
    font-family: var(--font-code) !important;
    font-size: 13px !important;
    line-height: 1.6 !important;
  }
  .CodeMirror-scroll { padding-bottom: 80px; }
  .CodeMirror-gutters { background: var(--surface) !important; border-right: 1px solid var(--border) !important; }
  .CodeMirror-linenumber { color: var(--muted) !important; font-size: 11px !important; min-width: 30px !important; }
  .CodeMirror-cursor { border-left: 2px solid var(--accent) !important; }
  .CodeMirror-selected { background: rgba(247,129,102,.18) !important; }
  .CodeMirror-activeline-background { background: rgba(255,255,255,.03) !important; }
  .cm-keyword { color: #ff7b72 !important; }
  .cm-def, .cm-variable-2 { color: #79c0ff !important; }
  .cm-string { color: #a5d6ff !important; }
  .cm-number { color: #f2cc60 !important; }
  .cm-comment { color: var(--muted) !important; font-style: italic !important; }
  .cm-property { color: #d2a8ff !important; }
  .cm-operator { color: var(--accent) !important; }
  #editor-wrap { flex: 1; overflow: hidden; min-height: 0; }

  /* Divider */
  #divider {
    height: 5px;
    background: var(--border);
    cursor: row-resize;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #divider::after {
    content: '';
    width: 36px;
    height: 3px;
    border-radius: 2px;
    background: var(--muted);
    opacity: .5;
  }

  /* Preview pane */
  #preview-pane {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    height: 260px;
  }
  #preview-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
    min-height: 0;
  }
  #three-canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    touch-action: none;
  }

  /* Overlay states */
  #preview-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }
  .overlay-icon { font-size: 36px; opacity: .3; }
  .overlay-text { font-family: var(--font-ui); font-size: 12px; color: var(--muted); text-align: center; padding: 0 20px; }

  /* Grid lines on empty canvas */
  #grid-hint {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: .04;
    background-image:
      linear-gradient(var(--text) 1px, transparent 1px),
      linear-gradient(90deg, var(--text) 1px, transparent 1px);
    background-size: 30px 30px;
  }

  /* Loading spinner */
  #spinner {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    background: rgba(13,17,23,.7);
    z-index: 10;
  }
  #spinner.active { display: flex; }
  .spin-ring {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 3D controls hint */
  #controls-hint {
    position: absolute;
    bottom: 6px;
    right: 8px;
    font-family: var(--font-ui);
    font-size: 9px;
    color: var(--muted);
    opacity: .5;
    pointer-events: none;
    line-height: 1.5;
    text-align: right;
  }

  /* ── STATUS BAR ── */
  #status-bar {
    height: var(--status-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    flex-shrink: 0;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background .3s;
  }
  .status-dot.ok { background: var(--accent2); }
  .status-dot.err { background: var(--accent); }
  .status-dot.busy { background: var(--warning); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #status-text {
    font-family: var(--font-code);
    font-size: 10px;
    color: var(--muted);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .status-meta {
    font-family: var(--font-code);
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── AI PANEL ── */
  #ai-panel {
    display: none;
    flex-direction: column;
    position: absolute;
    bottom: var(--status-h);
    left: 0; right: 0;
    height: 50%;
    background: var(--surface);
    border-top: 1px solid #7c6af7;
    z-index: 30;
    overflow: hidden;
  }
  #ai-panel.open { display: flex; }
  .ai-header {
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: #13111f;
  }
  .ai-title {
    font-family: var(--font-code);
    font-size: 11px;
    color: #a78bfa;
    font-weight: 600;
    letter-spacing: .5px;
  }
  .ai-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  #ai-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }
  .ai-msg {
    font-family: var(--font-ui);
    font-size: 12px;
    line-height: 1.5;
    padding: 8px 10px;
    border-radius: var(--radius);
    max-width: 90%;
  }
  .ai-msg.user {
    background: #1c2a3a;
    border: 1px solid #1f6feb;
    color: #79c0ff;
    align-self: flex-end;
  }
  .ai-msg.assistant {
    background: #1a1a2e;
    border: 1px solid #7c6af7;
    color: #c9d1d9;
    align-self: flex-start;
  }
  .ai-msg.system {
    background: transparent;
    color: var(--muted);
    font-style: italic;
    font-size: 10px;
    align-self: center;
    border: none;
    padding: 2px 0;
  }
  #ai-input-row {
    display: flex;
    gap: 6px;
    padding: 8px 10px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: #13111f;
  }
  #ai-input {
    flex: 1;
    height: 34px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 12px;
    padding: 0 10px;
    outline: none;
  }
  #ai-input:focus { border-color: #7c6af7; }
  #ai-send {
    height: 34px;
    width: 34px;
    background: #7c6af7;
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #ai-send:active { background: #6254c7; }

  /* ── SNIPPETS DRAWER ── */
  #snippets-drawer {
    display: none;
    position: absolute;
    top: var(--toolbar-h);
    right: 0;
    width: 220px;
    bottom: var(--status-h);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 25;
    flex-direction: column;
    overflow: hidden;
  }
  #snippets-drawer.open { display: flex; }
  .drawer-header {
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .drawer-title { font-family: var(--font-ui); font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
  .drawer-close { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent; }
  #snippets-list { flex: 1; overflow-y: auto; padding: 6px; }
  .snippet-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 3px;
    border: 1px solid var(--border);
    transition: border-color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .snippet-item:active { border-color: var(--accent); background: rgba(247,129,102,.07); }
  .snippet-name { font-family: var(--font-code); font-size: 11px; color: var(--text); font-weight: 600; }
  .snippet-desc { font-family: var(--font-ui); font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: all .25s;
    z-index: 100;
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--accent2); color: var(--accent2); }
  #toast.error { border-color: var(--accent); color: var(--accent); }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <div class="logo">Forge<span>CAD</span></div>
    <div class="tb-sep"></div>
    <button class="tb-btn primary" id="btn-render" onclick="handleRender()">
      <span class="tb-icon">▶</span>
      <span id="render-label">Render</span>
    </button>
    <button class="tb-btn success" id="btn-export" onclick="exportSTL()" disabled>
      <span class="tb-icon">⬇</span> STL
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn ai-btn" onclick="toggleAI()">
      <span class="tb-icon">✦</span> AI
    </button>
    <button class="tb-btn" onclick="toggleSnippets()">
      <span class="tb-icon">☰</span>
    </button>
    <div class="tb-spacer"></div>
    <button class="tb-btn" onclick="resetCamera()" title="Reset view">⊕</button>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- SPLIT PANELS -->
    <div id="split">

      <!-- EDITOR PANE -->
      <div id="editor-pane">
        <div class="pane-header">
          <span class="pane-title">Editor</span>
          <span class="file-name">model.jscad</span>
          <div class="pane-actions">
            <button class="pane-btn" onclick="clearEditor()">Clear</button>
            <button class="pane-btn" onclick="loadExample()">Example</button>
          </div>
        </div>
        <div id="editor-wrap">
          <textarea id="code-editor"></textarea>
        </div>
      </div>

      <!-- DRAG DIVIDER -->
      <div id="divider"></div>

      <!-- PREVIEW PANE -->
      <div id="preview-pane">
        <div class="pane-header">
          <span class="pane-title">3D Preview</span>
          <div class="pane-actions" id="mesh-info" style="display:none">
            <span class="pane-btn" style="cursor:default;" id="tri-count">0 triangles</span>
          </div>
        </div>
        <div id="preview-wrap">
          <div id="grid-hint"></div>
          <canvas id="three-canvas"></canvas>
          <div id="preview-overlay">
            <div class="overlay-icon">◈</div>
            <div class="overlay-text">Press Render to build your model</div>
          </div>
          <div id="spinner"><div class="spin-ring"></div></div>
          <div id="controls-hint">Drag: rotate<br>Pinch: zoom<br>2-finger: pan</div>
        </div>
      </div>

    </div>

    <!-- AI PANEL -->
    <div id="ai-panel">
      <div class="ai-header">
        <span class="ai-title">✦ ForgeCAD AI</span>
        <button class="ai-close" onclick="toggleAI()">×</button>
      </div>
      <div id="ai-messages">
        <div class="ai-msg system">AI assistant — analyzes your JSCAD code, suggests improvements, explains geometry</div>
      </div>
      <div id="ai-input-row">
        <input id="ai-input" type="text" placeholder="Ask about your model..." autocomplete="off">
        <button id="ai-send" onclick="sendAI()">➤</button>
      </div>
    </div>

    <!-- SNIPPETS DRAWER -->
    <div id="snippets-drawer">
      <div class="drawer-header">
        <span class="drawer-title">Snippets</span>
        <button class="drawer-close" onclick="toggleSnippets()">×</button>
      </div>
      <div id="snippets-list"></div>
    </div>

  </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready</span>
    <span class="status-meta" id="status-meta">JSCAD 2.x</span>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- JSCAD via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ═══════════════════════════════════════════════════
// JSCAD CORE — embedded minimal modeling engine
// Supports: cube, sphere, cylinder, union, difference,
//           intersection, translate, rotate, scale, hull
// ═══════════════════════════════════════════════════

const JSCAD = (() => {
  // CSG-like geometry via Three.js BufferGeometry
  
  function makeCube({ size = 1, center = false } = {}) {
    const s = Array.isArray(size) ? size : [size, size, size];
    const g = new THREE.BoxGeometry(s[0], s[1], s[2]);
    if (!center) g.translate(s[0]/2, s[1]/2, s[2]/2);
    return { type: 'mesh', geo: g };
  }

  function makeSphere({ r = 1, fn = 24 } = {}) {
    const g = new THREE.SphereGeometry(r, fn, Math.ceil(fn/2));
    return { type: 'mesh', geo: g };
  }

  function makeCylinder({ r = 1, r1, r2, h = 2, fn = 32, center = false } = {}) {
    const rt = r2 !== undefined ? r2 : r;
    const rb = r1 !== undefined ? r1 : r;
    const g = new THREE.CylinderGeometry(rt, rb, h, fn);
    if (!center) g.translate(0, h/2, 0);
    return { type: 'mesh', geo: g };
  }

  function makeTorus({ r = 2, tube = 0.5, fn = 32 } = {}) {
    const g = new THREE.TorusGeometry(r, tube, 16, fn);
    return { type: 'mesh', geo: g };
  }

  function applyTransform(obj, matrix) {
    if (!obj) return obj;
    if (Array.isArray(obj)) return obj.map(o => applyTransform(o, matrix));
    const clone = obj.geo.clone();
    clone.applyMatrix4(matrix);
    return { ...obj, geo: clone };
  }

  function translate(v, obj) {
    const m = new THREE.Matrix4().makeTranslation(v[0], v[1], v[2]);
    return applyTransform(obj, m);
  }

  function rotate(v, obj) {
    const m = new THREE.Matrix4()
      .makeRotationX(THREE.MathUtils.degToRad(v[0]))
      .multiply(new THREE.Matrix4().makeRotationY(THREE.MathUtils.degToRad(v[1])))
      .multiply(new THREE.Matrix4().makeRotationZ(THREE.MathUtils.degToRad(v[2])));
    return applyTransform(obj, m);
  }

  function scale(v, obj) {
    const sv = Array.isArray(v) ? v : [v, v, v];
    const m = new THREE.Matrix4().makeScale(sv[0], sv[1], sv[2]);
    return applyTransform(obj, m);
  }

  // Merge geometries for union-like visual grouping
  function mergeGeos(objs) {
    const meshes = [];
    function collect(o) {
      if (!o) return;
      if (Array.isArray(o)) o.forEach(collect);
      else if (o.type === 'mesh') meshes.push(o.geo);
    }
    collect(objs);
    return meshes;
  }

  function union(...objs) {
    const flat = objs.flat(Infinity).filter(Boolean);
    const geos = mergeGeos(flat);
    return geos.map(g => ({ type: 'mesh', geo: g }));
  }

  function difference(base, ...subs) {
    // Visual approximation: show base + translucent subs
    const baseGeos = mergeGeos(base).map(g => ({ type: 'mesh', geo: g, role: 'base' }));
    const subGeos = mergeGeos(subs.flat(Infinity)).map(g => ({ type: 'mesh', geo: g, role: 'sub' }));
    return [...baseGeos, ...subGeos];
  }

  function intersection(...objs) {
    return mergeGeos(objs.flat()).map(g => ({ type: 'mesh', geo: g }));
  }

  function hull(...objs) {
    return union(...objs);
  }

  function linear_extrude({ height = 10 } = {}, profile) {
    // Approximate: scale a flat shape up in Y
    return scale([1, height, 1], profile);
  }

  return {
    cube: makeCube,
    sphere: makeSphere,
    cylinder: makeCylinder,
    torus: makeTorus,
    translate,
    rotate,
    scale,
    union,
    difference,
    intersection,
    hull,
    linear_extrude,
    mergeGeos
  };
})();

// THREE.JS SCENE SETUP
// ═══════════════════════════════════════════════════
let scene, camera, renderer, controls;
let meshGroup = null;
let currentGeometries = [];

function initThree() {
  const wrap = document.getElementById('preview-wrap');
  const canvas = document.getElementById('three-canvas');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1117);

  // Grid
  const grid = new THREE.GridHelper(100, 20, 0x21262d, 0x21262d);
  scene.add(grid);

  // Axes
  const axesHelper = new THREE.AxesHelper(5);
  scene.add(axesHelper);

  // Ambient + directional lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight1.position.set(10, 20, 10);
  scene.add(dirLight1);
  const dirLight2 = new THREE.DirectionalLight(0x7ec8e3, 0.3);
  dirLight2.position.set(-10, -5, -10);
  scene.add(dirLight2);

  // Camera
  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 1000);
  camera.position.set(15, 12, 20);
  camera.lookAt(0, 0, 0);

  // Renderer
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.shadowMap.enabled = true;

  // Touch controls
  setupTouchControls(canvas);

  // Resize
  const ro = new ResizeObserver(() => {
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
  });
  ro.observe(wrap);

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════
// TOUCH CONTROLS (orbit + pinch zoom + pan)
// ═══════════════════════════════════════════════════
function setupTouchControls(canvas) {
  let prevTouch1 = null, prevTouch2 = null;
  let prevDist = null;
  let isDragging = false;
  let prevMouse = { x: 0, y: 0 };

  // Spherical coords
  let spherical = { theta: 0.8, phi: 1.0, radius: 30 };
  let target = new THREE.Vector3(0, 0, 0);

  function updateCamera() {
    camera.position.set(
      target.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta),
      target.y + spherical.radius * Math.cos(spherical.phi),
      target.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta)
    );
    camera.lookAt(target);
  }
  updateCamera();

  window._resetCamera = () => {
    spherical = { theta: 0.8, phi: 1.0, radius: 30 };
    target.set(0, 0, 0);
    updateCamera();
  };

  window._fitCamera = (geos) => {
    if (!geos || geos.length === 0) return;
    const box = new THREE.Box3();
    geos.forEach(g => { const b = new THREE.Box3(); b.setFromBufferAttribute(g.attributes.position); box.union(b); });
    const center = new THREE.Vector3(); box.getCenter(center);
    const size = new THREE.Vector3(); box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    target.copy(center);
    spherical.radius = maxDim * 2.5;
    updateCamera();
  };

  // Mouse events (desktop)
  canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
  window.addEventListener('mouseup', () => { isDragging = false; });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    spherical.theta -= dx * 0.01;
    spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.01));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
  });
  canvas.addEventListener('wheel', e => {
    spherical.radius *= (1 + e.deltaY * 0.001);
    spherical.radius = Math.max(1, Math.min(500, spherical.radius));
    updateCamera();
  });

  // Touch events (mobile)
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      prevTouch1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
      prevTouch1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      prevTouch2 = { x: e.touches[1].clientX, y: e.touches[1].clientY };
      prevDist = Math.hypot(prevTouch1.x - prevTouch2.x, prevTouch1.y - prevTouch2.y);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && prevTouch1) {
      const dx = e.touches[0].clientX - prevTouch1.x;
      const dy = e.touches[0].clientY - prevTouch1.y;
      spherical.theta -= dx * 0.012;
      spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.012));
      prevTouch1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      updateCamera();
    } else if (e.touches.length === 2 && prevTouch2) {
      const t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      const t2 = { x: e.touches[1].clientX, y: e.touches[1].clientY };
      const dist = Math.hypot(t1.x - t2.x, t1.y - t2.y);
      if (prevDist) {
        spherical.radius *= prevDist / dist;
        spherical.radius = Math.max(1, Math.min(500, spherical.radius));
      }
      // Pan: midpoint delta
      const midX = (t1.x + t2.x) / 2;
      const midY = (t1.y + t2.y) / 2;
      const pmidX = (prevTouch1.x + prevTouch2.x) / 2;
      const pmidY = (prevTouch1.y + prevTouch2.y) / 2;
      const right = new THREE.Vector3(); camera.getWorldDirection(right); right.cross(camera.up).normalize();
      const up = camera.up.clone();
      const panSpeed = spherical.radius * 0.002;
      target.addScaledVector(right, -(midX - pmidX) * panSpeed);
      target.addScaledVector(up, (midY - pmidY) * panSpeed);
      prevTouch1 = t1; prevTouch2 = t2; prevDist = dist;
      updateCamera();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (e.touches.length === 0) { prevTouch1 = null; prevTouch2 = null; prevDist = null; }
    else if (e.touches.length === 1) { prevTouch1 = { x: e.touches[0].clientX, y: e.touches[0].clientY }; prevTouch2 = null; }
  });
}

function resetCamera() { if (window._resetCamera) window._resetCamera(); }

let editor;

const DEFAULT_CODE = `// ForgeCAD — JSCAD-compatible parametric modeler
// Use the API below to create 3D geometry

const { cube, sphere, cylinder, torus,
        translate, rotate, scale,
        union, difference } = JSCAD;

// Parameters
const wallH = 12;
const wallT = 2;
const r     = 5;

// Base box
const base = cube({ size: [20, wallH, 20] });

// Hollow center
const hole = translate([wallT, -1, wallT],
  cube({ size: [20 - wallT*2, wallH + 2, 20 - wallT*2] })
);

// Cap cylinder
const cap = translate([10, wallH, 10],
  cylinder({ r: r, h: 3, fn: 48 })
);

// Small bolt holes
const bolt = (x, z) => translate([x, wallH - 0.5, z],
  cylinder({ r: 0.8, h: 2, fn: 16 })
);

return union(
  difference(base, hole),
  cap,
  bolt(3, 3),
  bolt(17, 3),
  bolt(3, 17),
  bolt(17, 17)
);`;

function initEditor() {

// ═══════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════
function setStatus(text, type = '') {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
}

async function handleRender() {
  const btn = document.getElementById('btn-render');
  const label = document.getElementById('render-label');
  const spinner = document.getElementById('spinner');
  const overlay = document.getElementById('preview-overlay');

  btn.disabled = true;
  label.textContent = 'Building…';
  spinner.classList.add('active');
  setStatus('Rendering…', 'busy');

  // Small delay to allow UI update
  await new Promise(r => setTimeout(r, 30));

  try {
    const code = editor.getValue();
    const result = runCode(code);
    displayModel(result);
    overlay.style.display = 'none';
    document.getElementById('btn-export').disabled = false;
    setStatus('Render complete', 'ok');
    toast('Render complete ✓', 'success');
  } catch (err) {
    setStatus('Error: ' + err.message, 'err');
    toast('Error: ' + err.message, 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
    label.textContent = 'Render';
    spinner.classList.remove('active');
  }
}

function runCode(code) {
  // Inject JSCAD into scope and execute
  const fn = new Function('JSCAD', `"use strict"; ${code}`);
  return fn(JSCAD);
}

const MATERIAL = new THREE.MeshPhongMaterial({
  color: 0x56a8d6,
  specular: 0x2266aa,
  shininess: 60,
  side: THREE.DoubleSide
});

const SUB_MATERIAL = new THREE.MeshPhongMaterial({
  color: 0xf78166,
  specular: 0x662211,
  shininess: 40,
  transparent: true,
  opacity: 0.35,
  side: THREE.DoubleSide
});

function displayModel(result) {
  // Clear previous meshes
  if (meshGroup) {
    scene.remove(meshGroup);
    meshGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); });
  }
  meshGroup = new THREE.Group();

  const geoList = [];
  let triCount = 0;

  function addObj(obj) {
    if (!obj) return;
    if (Array.isArray(obj)) { obj.forEach(addObj); return; }
    if (obj.type !== 'mesh' || !obj.geo) return;

    obj.geo.computeVertexNormals();
    const mat = obj.role === 'sub' ? SUB_MATERIAL.clone() : MATERIAL.clone();
    const mesh = new THREE.Mesh(obj.geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    meshGroup.add(mesh);
    geoList.push(obj.geo);

    const idx = obj.geo.index;
    triCount += idx ? idx.count / 3 : (obj.geo.attributes.position.count / 3);
  }

  addObj(result);
  scene.add(meshGroup);
  currentGeometries = geoList;

  // Fit camera
  if (window._fitCamera) window._fitCamera(geoList);

  // Update tri count
  const info = document.getElementById('mesh-info');
  info.style.display = 'flex';
  document.getElementById('tri-count').textContent = Math.floor(triCount).toLocaleString() + ' triangles';
}

// ═══════════════════════════════════════════════════
// STL EXPORT
// ═══════════════════════════════════════════════════
function exportSTL() {
  if (!meshGroup || currentGeometries.length === 0) {
    toast('Nothing to export', 'error');
    return;
  }

  let stlContent = 'solid ForgeCAD\n';
  let triCount = 0;

  currentGeometries.forEach(geo => {
    const pos = geo.attributes.position;
    const norm = geo.attributes.normal;
    const idx = geo.index;
    const verts = idx ? idx.count : pos.count;

    for (let i = 0; i < verts; i += 3) {
      const getI = (j) => idx ? idx.getX(i + j) : i + j;
      const v = (j) => new THREE.Vector3(pos.getX(getI(j)), pos.getY(getI(j)), pos.getZ(getI(j)));
      const n = norm ? new THREE.Vector3(norm.getX(getI(0)), norm.getY(getI(0)), norm.getZ(getI(0)))
        : new THREE.Vector3(0, 0, 1);

      stlContent += `  facet normal ${n.x.toFixed(6)} ${n.y.toFixed(6)} ${n.z.toFixed(6)}\n`;
      stlContent += `    outer loop\n`;
      for (let j = 0; j < 3; j++) {
        const vj = v(j);
        stlContent += `      vertex ${vj.x.toFixed(6)} ${vj.y.toFixed(6)} ${vj.z.toFixed(6)}\n`;
      }
      stlContent += `    endloop\n  endfacet\n`;
      triCount++;
    }
  });

  stlContent += 'endsolid ForgeCAD\n';

  const blob = new Blob([stlContent], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'model_forgecad.stl';
  a.click();
  URL.revokeObjectURL(url);

  toast(`STL exported (${triCount.toLocaleString()} triangles)`, 'success');
  setStatus(`Exported ${triCount.toLocaleString()} triangles`, 'ok');
}

// ═══════════════════════════════════════════════════
// AI ASSISTANT
// ═══════════════════════════════════════════════════
let aiOpen = false;
let aiHistory = [];

function toggleAI() {
  aiOpen = !aiOpen;
  document.getElementById('ai-panel').classList.toggle('open', aiOpen);
}

async function sendAI() {
  const input = document.getElementById('ai-input');
  const msg = input.value.trim();
  if (!msg) return;

  const code = editor.getValue();
  input.value = '';

  addAIMessage('user', msg);

  const systemPrompt = `You are ForgeCAD AI, an expert in JSCAD parametric 3D modeling.
The user writes JavaScript code using this JSCAD API:
  cube({size, center}), sphere({r, fn}), cylinder({r, r1, r2, h, fn, center}),
  torus({r, tube, fn}), translate([x,y,z], obj), rotate([x,y,z], obj),
  scale([x,y,z], obj), union(...objs), difference(base, ...subs),
  intersection(...objs), hull(...objs)

Be concise. Give practical code suggestions. Format code in \`\`\`js blocks.
Current model code:
\`\`\`js
${code}
\`\`\``;

  aiHistory.push({ role: 'user', content: msg });

  const typingEl = addAIMessage('assistant', '…');
  typingEl.style.opacity = '0.5';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: aiHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'No response.';

    typingEl.textContent = reply;
    typingEl.style.opacity = '1';
    aiHistory.push({ role: 'assistant', content: reply });

    // Auto-insert code if response contains a single code block
    const codeMatch = reply.match(/```(?:js|javascript)?\n([\s\S]+?)```/);
    if (codeMatch && reply.match(/```/g)?.length === 2) {
      const insertBtn = document.createElement('button');
      insertBtn.textContent = '⬆ Insert into editor';
      insertBtn.style.cssText = 'margin-top:6px;padding:4px 8px;border:1px solid #56d364;background:#1a3a1e;color:#56d364;border-radius:4px;font-size:10px;cursor:pointer;display:block;font-family:var(--font-ui)';
      insertBtn.onclick = () => { editor.setValue(codeMatch[1]); toast('Code inserted', 'success'); };
      typingEl.appendChild(document.createElement('br'));
      typingEl.appendChild(insertBtn);
    }
  } catch (err) {
    typingEl.textContent = 'AI error: ' + err.message;
    typingEl.style.opacity = '1';
  }

  // Scroll to bottom
  const msgs = document.getElementById('ai-messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function addAIMessage(role, text) {
  const el = document.createElement('div');
  el.className = 'ai-msg ' + role;
  el.textContent = text;
  const msgs = document.getElementById('ai-messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

document.getElementById('ai-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendAI();
});

// ═══════════════════════════════════════════════════
// DRAG DIVIDER (resize editor/preview)
// ═══════════════════════════════════════════════════
function initDivider() {
  const divider = document.getElementById('divider');
  const editorPane = document.getElementById('editor-pane');
  const previewPane = document.getElementById('preview-pane');
  const split = document.getElementById('split');

  let dragging = false, startY = 0, startEdH = 0, startPrH = 0;

  function start(y) {
    dragging = true;
    startY = y;
    startEdH = editorPane.getBoundingClientRect().height;
    startPrH = previewPane.getBoundingClientRect().height;
  }
  function move(y) {
    if (!dragging) return;
    const dy = y - startY;
    const newEd = Math.max(80, startEdH + dy);
    const newPr = Math.max(80, startPrH - dy);
    editorPane.style.flex = 'none';
    editorPane.style.height = newEd + 'px';
    previewPane.style.height = newPr + 'px';
    editor.refresh();
  }
  function end() { dragging = false; }

  divider.addEventListener('mousedown', e => start(e.clientY));
  window.addEventListener('mousemove', e => move(e.clientY));
  window.addEventListener('mouseup', end);

  divider.addEventListener('touchstart', e => { e.preventDefault(); start(e.touches[0].clientY); }, { passive: false });
  window.addEventListener('touchmove', e => { if (dragging) { e.preventDefault(); move(e.touches[0].clientY); } }, { passive: false });
  window.addEventListener('touchend', end);
}
